on:
  pull_request:
    paths: &paths
      - 'resources/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/mutation.yml'
      - 'composer.json'
      - 'phpunit.xml.dist'

  push:
    branches: ['master']
    paths: *paths

name: mutation

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: yiisoft/actions/.github/workflows/db-mutation.yml@add-db-mutation


on:
  pull_request:
    paths: &paths
      - 'resources/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/pgsql.yml'
      - 'composer.json'
      - 'phpunit.xml.dist'

  push:
    branches: ['master']
    paths: *paths

name: pgsql

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: yiisoft/actions/.github/workflows/db-pgsql.yml@ab62d6b3b0e0cff6c9724ec5a395bedb41c639a2
